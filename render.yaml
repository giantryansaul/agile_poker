services:
  - type: web
    name: agile-poker-server
    runtime: node
    rootDir: server
    buildCommand: npm install --include=dev && npm run build && npm prune --omit=dev
    startCommand: node dist/server/src/main
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

  - type: web
    name: agile-poker-client
    runtime: node
    rootDir: client
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l $PORT
    plan: free
    envVars:
      - key: VITE_WS_URL
        fromService:
          name: agile-poker-server
          type: web
          property: host

services:
  - type: web
    name: agile-poker-server
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: node dist/server/src/main
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

  - type: static
    name: agile-poker-client
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_WS_URL
        fromService:
          name: agile-poker-server
          type: web
          property: host
